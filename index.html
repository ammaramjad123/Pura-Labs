<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>
      Pura Labs | AI Voice Agents That Answer, Book & Convert 24/7
    </title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Never miss another call or customer. Pura Labs AI voice agents answer calls, capture leads, and book appointments automatically — 24/7 for your business."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="AI voice agents, AI receptionist, call automation, business automation, appointment booking AI, virtual receptionist, AI call handling"
    />

    <!-- Author -->
    <meta name="author" content="Pura Labs" />

    <!-- Open Graph (Facebook, LinkedIn etc.) -->
    <meta
      property="og:title"
      content="Pura Labs | AI That Answers, Books, and Converts — 24/7"
    />
    <meta
      property="og:description"
      content="AI voice agents that handle every call, capture opportunities, and book appointments automatically."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://puralabs.ai" />
    <meta property="og:image" content="/og.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Pura Labs | Smart AI Call Handling"
    />
    <meta
      name="twitter:description"
      content="Answer every call. Capture every opportunity with AI voice agents."
    />
    <meta name="twitter:image" content="/og.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#6D28D9" />

    <!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link href="/src/index.css" rel="stylesheet" />
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
